/* ============ MOTOR FINANCEIRO ============ */
function npv(rate, cfs) {
  let s = 0;
  for (let t = 0; t < cfs.length; t++) s += cfs[t] / Math.pow(1 + rate, t);
  return s;
}
function irr(cfs) {
  let lo = -0.95,
    hi = 15;
  let flo = npv(lo, cfs),
    fhi = npv(hi, cfs);
  if (isNaN(flo) || isNaN(fhi) || flo * fhi > 0) return NaN;
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const fm = npv(mid, cfs);
    if (Math.abs(fm) < 1e-7) return mid;
    if (flo > 0 === fm > 0) {
      lo = mid;
      flo = fm;
    } else {
      hi = mid;
      fhi = fm;
    }
  }
  return (lo + hi) / 2;
}

// Monta o fluxo de caixa anual (Ano 0 a Ano 20) e o detalhamento linha a linha de cada ano
function buildCashFlow(p) {
  const {
    netRevenueMonthlyBalcao,
    netRevenueMonthlyDelivery,
    upliftBalcaoRS,
    upliftDeliveryRS,
    cogsPct,
    royaltiesPct,
    marketingPct,
    digitalCommissionPct,
    taxOffsetPct,
    cardPct,
    laborMonthly,
    occupationMonthly,
    utilitiesMonthly,
    gaPct,
    taxRate,
    capexInicial,
    valorLiquidoPago,
    buildingsShare,
    itShare,
    buildingsLife,
    itLife
  } = p;

  // Uplift pós-reforma entra em R$ absolutos, só a partir do Ano 1 (depois fica plano)
  const balcaoAnual = (netRevenueMonthlyBalcao + upliftBalcaoRS) * 12;
  const deliveryAnual = (netRevenueMonthlyDelivery + upliftDeliveryRS) * 12;
  const netRevenueAnual = balcaoAnual + deliveryAnual;
  const deliveryShare = netRevenueAnual > 0 ? deliveryAnual / netRevenueAnual : 0;
  const deliveryNet = netRevenueAnual * deliveryShare;
  const deliveryGross = deliveryNet / (1 - 0.11);
  const cogs = netRevenueAnual * cogsPct;
  const grossMargin = netRevenueAnual + cogs;
  const royalties = netRevenueAnual * royaltiesPct;
  const marketing = netRevenueAnual * marketingPct;
  const digitalChannels = deliveryGross * -digitalCommissionPct * (1 - taxOffsetPct);
  const cardProcessing = netRevenueAnual * cardPct;
  const variableCosts = royalties + marketing + digitalChannels + cardProcessing;
  const contribMargin = grossMargin + variableCosts;
  const laborAnual = laborMonthly * 12;
  const ocupacaoAnual = occupationMonthly * 12;
  const utilitiesAnual = utilitiesMonthly * 12;
  const fixedCosts = laborAnual + ocupacaoAnual + utilitiesAnual;
  const ebitda = contribMargin + fixedCosts; // 4-Wall EBITDA anual (flat a partir do Ano 1)
  const ga = netRevenueAnual * gaPct;
  const investimentoTotal = capexInicial + valorLiquidoPago;

  /* ---- Depreciação e Amortização (D&A) ----
     Base Ano 0: capex de reforma/equipamentos (capexInicial) + capex de compra (valorLiquidoPago, ponto/goodwill).
     - Construção/Outros + capex de compra: depreciados em 10 anos (buildingsLife)
     - TI: depreciado em 5 anos (itLife)
     Capex de manutenção/reinvestimento (inclusive os 31% do Ano 10): cada aporte gera seu próprio
     vintage de depreciação em 10 anos, começando no ano seguinte ao desembolso — assim o grande
     reinvestimento do Ano 10 também gera escudo fiscal nos Anos 11-20, o que é o tratamento
     financeiramente correto (sem isso, o NOPAT dos anos seguintes ficaria artificialmente baixo). */
  const MAINT_DEP_LIFE = 10;
  const buildingsBase = capexInicial * buildingsShare + valorLiquidoPago;
  const itBase = capexInicial * itShare;
  const maintCapexByYear = MAINT_SCHEDULE.map(pct => pct * investimentoTotal); // índice 0 = Ano 1 ... índice 19 = Ano 20

  const grossDepByYear = new Array(20).fill(0);
  for (let t = 1; t <= 20; t++) {
    if (t <= buildingsLife) grossDepByYear[t - 1] += buildingsBase / buildingsLife;
    if (t <= itLife) grossDepByYear[t - 1] += itBase / itLife;
  }
  for (let k = 1; k <= 20; k++) {
    const amt = maintCapexByYear[k - 1];
    if (!amt) continue;
    for (let t = k + 1; t <= Math.min(20, k + MAINT_DEP_LIFE); t++) {
      grossDepByYear[t - 1] += amt / MAINT_DEP_LIFE;
    }
  }
  const cfs = [-investimentoTotal];
  const detalhe = [];
  for (let t = 1; t <= 20; t++) {
    const grossDep = grossDepByYear[t - 1];
    const pisBenefit = grossDep * taxOffsetPct;
    const netDep = grossDep - pisBenefit;
    const ebit = ebitda - ga - netDep;
    const tax = ebit > 0 ? -ebit * taxRate : 0;
    const nopat = ebitda - ga + tax;
    const maint = -maintCapexByYear[t - 1];
    const cf = nopat + maint;
    detalhe.push({
      ano: t,
      netRevenueBalcao: balcaoAnual,
      netRevenueDelivery: deliveryAnual,
      netRevenue: netRevenueAnual,
      cogs,
      grossMargin,
      royalties,
      marketing,
      digitalChannels,
      cardProcessing,
      variableCosts,
      contribMargin,
      labor: laborAnual,
      ocupacao: ocupacaoAnual,
      utilities: utilitiesAnual,
      ebitda,
      ga,
      depreciacao: netDep,
      ebit,
      imposto: tax,
      nopat,
      capexManutencao: maint,
      cashFlow: cf
    });
    cfs.push(cf);
  }
  return {
    cfs,
    ebitda,
    ga,
    netRevenueAnual,
    balcaoAnual,
    deliveryAnual,
    detalhe,
    investimentoTotal
  };
}
function calcularTIR(p) {
  const {
    cfs
  } = buildCashFlow(p);
  return irr(cfs);
}

// Resolve o valor bruto pago ao franqueado para atingir uma TIR-alvo (bisseção), já líquido das dívidas
function resolverValorParaTIR(pBase, tirAlvo, dividaTotal) {
  let lo = 0,
    hi = (pBase.capexInicial + 1) * 60 + 2000000;
  const tirLo = calcularTIR({
    ...pBase,
    valorLiquidoPago: Math.max(0, lo - dividaTotal)
  });
  if (isNaN(tirLo)) return null;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const valorLiquido = Math.max(0, mid - dividaTotal);
    const tirMid = calcularTIR({
      ...pBase,
      valorLiquidoPago: valorLiquido
    });
    if (isNaN(tirMid)) {
      hi = mid;
      continue;
    }
    if (tirMid > tirAlvo) lo = mid;else hi = mid;
  }
  return (lo + hi) / 2; // valor BRUTO a pagar ao franqueado
}
